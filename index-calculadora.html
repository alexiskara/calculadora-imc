<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" type="text/css" href="css.calculadora.css" media="screen" />
    <script type="text/javascript" src="js-calculadora.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="logo">IMC Pro</div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="aba-imc" onclick="trocarAba('aba-imc', this)">IMC</button>
            <button class="tab-btn" data-tab="aba-calorias" onclick="trocarAba('aba-calorias', this)">Calorias</button>
        </div>

        <!-- ABA 1: IMC -->
        <div class="tab-content active" id="aba-imc">
            <h1>Calculadora de IMC</h1>
            <div class="input-group">
                <label for="altura">Altura (m ou cm):</label>
                <input type="number" id="altura" placeholder="Ex: 1.75 ou 175" step="0.01">
            </div>
            <div class="input-group">
                <label for="peso">Peso (kg):</label>
                <input type="number" id="peso" placeholder="Ex: 70">
            </div>
            <button onclick="calcularIMC()">Calcular IMC</button>
            <div class="result" id="resultado"></div>
        </div>

        <!-- ABA 2: CALORIAS -->
        <div class="tab-content" id="aba-calorias">
            <h1>Calculadora de Calorias</h1>
            <div class="input-group">
                <label for="alturaCal">Altura (m ou cm):</label>
                <input type="number" id="alturaCal" placeholder="Ex: 1.75 ou 175" step="0.01">
            </div>
            <div class="input-group">
                <label for="pesoCal">Peso atual (kg):</label>
                <input type="number" id="pesoCal" placeholder="Ex: 70">
            </div>
            <div class="input-group">
                <label for="idade">Idade (anos):</label>
                <input type="number" id="idade" placeholder="Ex: 30">
            </div>
            <div class="input-group">
                <label for="sexo">Sexo:</label>
                <select id="sexo">
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                </select>
            </div>
            <div class="input-group">
                <label for="atividade">Nível de atividade física:</label>
                <select id="atividade">
                    <option value="1.2">Sedentário (pouco ou nenhum exercício)</option>
                    <option value="1.375">Levemente ativo (1-3 dias/semana)</option>
                    <option value="1.55">Moderadamente ativo (3-5 dias/semana)</option>
                    <option value="1.725">Muito ativo (6-7 dias/semana)</option>
                    <option value="1.9">Extremamente ativo (atleta/trabalho físico)</option>
                </select>
            </div>
            <button onclick="calcularCalorias()">Calcular Calorias</button>
            <div class="result" id="resultadoCalorias"></div>
        </div>

        <div class="footer">
            Desenvolvido por <a href="#">SeuNome</a>
        </div>
    </div>
</body>
</html>
