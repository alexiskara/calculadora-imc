<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css" media="screen" />
    <script type="text/javascript" src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="logo">IMC Pro</div>

        <div class="tabs" role="tablist">
            <button class="tab-btn active" data-tab="aba-imc" role="tab" aria-selected="true" onclick="trocarAba('aba-imc', this)">IMC</button>
            <button class="tab-btn" data-tab="aba-calorias" role="tab" aria-selected="false" onclick="trocarAba('aba-calorias', this)">Calorias</button>
            <button class="tab-btn" data-tab="aba-historico" role="tab" aria-selected="false" onclick="trocarAba('aba-historico', this)">Histórico</button>
        </div>

        <!-- ABA 1: IMC -->
        <div class="tab-content active" id="aba-imc">
            <h1>Calculadora de IMC</h1>
            <form onsubmit="event.preventDefault(); calcularIMC();">
                <div class="input-group">
                    <label for="altura">Altura (m ou cm):</label>
                    <input type="number" id="altura" placeholder="Ex: 1.75 ou 175" step="0.01" min="0.5" max="250">
                </div>
                <div class="input-group">
                    <label for="peso">Peso (kg):</label>
                    <input type="number" id="peso" placeholder="Ex: 70" step="0.1" min="20" max="400">
                </div>
                <button type="submit">Calcular IMC</button>
            </form>
            <div class="result" id="resultado"></div>
        </div>

        <!-- ABA 2: CALORIAS -->
        <div class="tab-content" id="aba-calorias">
            <h1>Calculadora de Calorias</h1>
            <form onsubmit="event.preventDefault(); calcularCalorias();">
                <div class="input-group">
                    <label for="alturaCal">Altura (m ou cm):</label>
                    <input type="number" id="alturaCal" placeholder="Ex: 1.75 ou 175" step="0.01" min="0.5" max="250">
                </div>
                <div class="input-group">
                    <label for="pesoCal">Peso atual (kg):</label>
                    <input type="number" id="pesoCal" placeholder="Ex: 70" step="0.1" min="20" max="400">
                </div>
                <div class="input-group">
                    <label for="idade">Idade (anos):</label>
                    <input type="number" id="idade" placeholder="Ex: 30" min="10" max="120">
                </div>
                <div class="input-group">
                    <label for="sexo">Sexo:</label>
                    <select id="sexo">
                        <option value="masculino">Masculino</option>
                        <option value="feminino">Feminino</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="atividade">Nível de atividade física:</label>
                    <select id="atividade">
                        <option value="1.2">Sedentário (pouco ou nenhum exercício)</option>
                        <option value="1.375">Levemente ativo (1-3 dias/semana)</option>
                        <option value="1.55">Moderadamente ativo (3-5 dias/semana)</option>
                        <option value="1.725">Muito ativo (6-7 dias/semana)</option>
                        <option value="1.9">Extremamente ativo (atleta/trabalho físico)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="metaPeso">Peso desejado (kg) — opcional:</label>
                    <input type="number" id="metaPeso" placeholder="Vazio = faixa de peso ideal" step="0.1" min="20" max="400">
                </div>
                <div class="input-group">
                    <label for="ritmo">Ritmo desejado:</label>
                    <select id="ritmo">
                        <option value="0.25">Leve (~0,25 kg por semana)</option>
                        <option value="0.5" selected>Moderado (~0,5 kg por semana)</option>
                        <option value="1">Agressivo (~1 kg por semana)</option>
                    </select>
                </div>
                <button type="submit">Calcular Calorias</button>
            </form>
            <div class="result" id="resultadoCalorias"></div>
        </div>

        <!-- ABA 3: HISTÓRICO -->
        <div class="tab-content" id="aba-historico">
            <h1>Histórico de Peso</h1>
            <form onsubmit="event.preventDefault(); registrarPeso();">
                <div class="input-group">
                    <label for="pesoHistorico">Peso de hoje (kg):</label>
                    <input type="number" id="pesoHistorico" placeholder="Ex: 70" step="0.1" min="20" max="400">
                </div>
                <button type="submit">Registrar peso de hoje</button>
            </form>
            <div class="result" id="grafico"></div>
            <div class="result" id="listaHistorico"></div>
        </div>

        <div class="footer">
            Desenvolvido por <a href="#">SeuNome</a>
            <button type="button" class="btn-limpar" onclick="limparDados()">Limpar dados salvos</button>
        </div>
    </div>
</body>
</html>
